<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prabal Jaiswal | Space Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ======================== RESET & BASE ======================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: radial-gradient(ellipse at 40% 30%, #0e0830 0%, #060418 45%, #020110 100%);
      min-height: 100vh;
      color: #e2e8f0;
      font-family: 'Rajdhani', sans-serif;
      overflow-x: hidden;
    }

    /* ======================== CANVAS ======================== */
    #space-bg {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }

    /* ======================== LAYOUT ======================== */
    #navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 50; }
    #app { position: relative; z-index: 10; padding-top: 72px; min-height: 100vh; }

    /* ======================== SCROLLBAR ======================== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.4); border-radius: 3px; }

    /* ======================== INPUTS ======================== */
    input, select, textarea {
      background: rgba(15,12,40,0.8);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 8px; color: #e2e8f0;
      padding: 10px 14px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.9rem; outline: none; width: 100%;
      box-sizing: border-box; transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus { border-color: rgba(168,85,247,0.8); }
    input[type="file"] { padding: 8px; cursor: pointer; }
    input[type="date"] { color-scheme: dark; }
    select option { background: #0a0820; }

    /* ======================== TABLE ======================== */
    table { width: 100%; border-collapse: collapse; }

    /* ======================== ANIMATIONS ======================== */
    @keyframes spin    { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes orbit   { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes bounce  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(8px); } }
    @keyframes pulse   {
      0%,100% { box-shadow: 0 0 12px rgba(168,85,247,0.9),0 0 25px rgba(168,85,247,0.5); }
      50%     { box-shadow: 0 0 20px rgba(168,85,247,1),  0 0 40px rgba(168,85,247,0.7); }
    }
    @keyframes fadeIn  { from { opacity:0; }              to { opacity:1; } }
    @keyframes slideUp { from { transform:translateY(30px);opacity:0; } to { transform:translateY(0);opacity:1; } }
    @keyframes popIn   { from { opacity:0;transform:translateY(-8px) scale(0.95); } to { opacity:1;transform:translateY(0) scale(1); } }
    @keyframes glow    {
      0%,100% { box-shadow: 0 0 30px rgba(124,58,237,0.4); }
      50%     { box-shadow: 0 0 50px rgba(124,58,237,0.7),0 0 80px rgba(6,182,212,0.3); }
    }
    @keyframes shake   {
      0%,100%  { transform:translateX(0); }
      20%,60%  { transform:translateX(-6px); }
      40%,80%  { transform:translateX(6px); }
    }


    @keyframes chevronBounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(12px); opacity: 1; }
    }
    @keyframes rocketGlow {
      0%, 100% { filter: drop-shadow(0 0 18px rgba(168,85,247,0.9)) drop-shadow(0 0 35px rgba(6,182,212,0.5)); }
      50% { filter: drop-shadow(0 0 30px rgba(168,85,247,1)) drop-shadow(0 0 50px rgba(6,182,212,0.8)) drop-shadow(0 0 70px rgba(168,85,247,0.4)); }
    }
    @keyframes trailShimmer {
      0% { opacity: 0.3; }
      50% { opacity: 0.8; }
      100% { opacity: 0.3; }
    }

    .page-enter { animation: fadeIn 0.35s ease both; }
    .page-exit  { opacity:0; pointer-events:none; }
    #warp-flash { display:none; }
    .nav-mobile-toggle { display: none; }
    .nav-mobile-menu   { display: none; }
    @media (max-width: 768px) {
      .nav-desktop       { display: none !important; }
      .nav-mobile-toggle { display: flex !important; }
    }
    @media (min-width: 769px) {
      .nav-mobile-menu   { display: none !important; }
    }

    /* ======================== MODAL ======================== */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,10,0.85);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px; animation: fadeIn 0.25s ease;
    }

    /* ======================== ROCKET SCROLL ======================== */
    #rocket-section  { height: 500vh; position: relative; }
    #rocket-sticky   {
      position: sticky; top: 0; height: 100vh;
      overflow: hidden; display: flex;
      align-items: flex-start; justify-content: center;
    }
    #rocket-track-line {
      position: absolute; left: 50%; top: 0; bottom: 0; width: 2px;
      transform: translateX(-50%);
      background: linear-gradient(to bottom, transparent, rgba(124,58,237,0.3) 10%, rgba(124,58,237,0.3) 90%, transparent);
    }
    #rocket-el {
      position: absolute; left: 50%; top: 90px;
      transform: translate(-50%,-50%); font-size: 2.8rem;
      filter: drop-shadow(0 0 18px rgba(168,85,247,0.9)) drop-shadow(0 0 35px rgba(6,182,212,0.5));
      user-select: none; z-index: 10; will-change: transform;
    }
    .ach-card {
      position: absolute; display: flex;
      align-items: center; gap: 0;
      transition: opacity 0.6s ease, transform 0.6s ease; z-index: 20;
    }
    .ach-summary {
      background: rgba(8,6,30,0.85); border: 1px solid rgba(124,58,237,0.5);
      border-radius: 10px; padding: 10px 16px; backdrop-filter: blur(12px);
      display: flex; align-items: center; gap: 10px; cursor: pointer;
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    .ach-summary:hover { box-shadow: 0 0 25px rgba(124,58,237,0.4); border-color: rgba(168,85,247,0.7); }
    .ach-popup {
      position: absolute; top: 110%; width: min(340px, 80vw);
      background: rgba(6,4,24,0.97); border: 1px solid rgba(124,58,237,0.5);
      border-radius: 12px; padding: 18px; backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,10,0.7),0 0 30px rgba(124,58,237,0.2);
      z-index: 30; animation: popIn 0.2s ease; display: none;
    }
    .ach-summary:hover + .ach-popup, .ach-popup:hover { display: block; }
    .node-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: #a855f7; flex-shrink: 0;
      box-shadow: 0 0 12px rgba(168,85,247,0.9),0 0 25px rgba(168,85,247,0.5);
      animation: pulse 2s infinite;
    }
    .connector {
      width: 40px; height: 2px; flex-shrink: 0;
      background: linear-gradient(90deg,rgba(124,58,237,0.8),rgba(124,58,237,0.2));
    }

    /* ======================== PRE / CODE ======================== */
    pre {
      background: rgba(0,0,0,0.5); border: 1px solid rgba(6,182,212,0.2);
      border-radius: 8px; padding: 12px; font-size: 0.7rem; color: #86efac;
      font-family: monospace; overflow-x: auto; line-height: 1.6; white-space: pre-wrap; margin: 0;
    }

    /* ======================== MISC HELPERS ======================== */
    .btn-icon { display: flex; align-items: center; justify-content: center; }
    .grad-text {
      background: linear-gradient(135deg, #c084fc, #a855f7, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    /* ======================== RESPONSIVE ======================== */

    /* --- Tablet & below: stack hero vertically --- */
    @media (max-width: 900px) {
      #hero-section {
        flex-direction: column !important;
        align-items: center !important;
        padding: 28px 24px 0 !important;
        gap: 28px !important;
        min-height: unset !important;
      }
      #hero-left {
        width: 100% !important;
        max-width: 360px !important;
        margin-top: 0 !important;
        align-self: center !important;
      }
      #hero-right {
        width: 100% !important;
        max-width: 100% !important;
        margin-left: 0 !important;
        flex: unset !important;
      }
      /* Projects: 2 col on tablet */
      #projects-grid {
        grid-template-columns: repeat(2, 1fr) !important;
      }
    }

    /* --- Mobile: single column everything --- */
    @media (max-width: 600px) {
      #hero-section {
        padding: 20px 16px 0 !important;
        gap: 20px !important;
      }
      #hero-photo {
        width: 180px !important;
        height: 180px !important;
      }
      /* Hide side achievement cards - they overflow on mobile */
      .ach-card { display: none !important; }
      /* Shorten the rocket scroll section on mobile */
      #rocket-section { height: 180vh !important; }
      /* Projects: 1 col */
      #projects-grid {
        grid-template-columns: 1fr !important;
      }
      /* Certs: 1 col */
      #certs-grid {
        grid-template-columns: 1fr !important;
      }
      /* Stats: 2x2 grid */
      #stats-row {
        display: grid !important;
        grid-template-columns: 1fr 1fr !important;
        gap: 10px !important;
      }
      /* Navbar brand smaller */
      #navbar { font-size: 0.85rem; }
      /* Scroll indicator text smaller */
      #scroll-indicator { padding: 12px 0 20px !important; }
    }

    /* --- Very small phones --- */
    @media (max-width: 380px) {
      #hero-photo {
        width: 150px !important;
        height: 150px !important;
      }
      #projects-grid {
        grid-template-columns: 1fr !important;
      }
    }
  </style>

<!-- ═══════════════════════════════════════════════════════════════
     PHP API DATA LAYER — fetches from MySQL via /api/ endpoints
══════════════════════════════════════════════════════════════════ -->
<script>
/* ================================================================
   API HELPER — All data flows through PHP backend
================================================================ */
const API_BASE = 'http://localhost:5000/api';

/* ── Token helpers ── */
function getAuthToken() { try { return localStorage.getItem('admin_token'); } catch(e) { return null; } }
function setAuthToken(t) { try { localStorage.setItem('admin_token', t); } catch(e) {} }
function clearAuthToken() { try { localStorage.removeItem('admin_token'); } catch(e) {} }

function authHeaders(extra) {
  extra = extra || {};
  var token = getAuthToken();
  var h = Object.assign({}, extra);
  if (token) h['Authorization'] = 'Bearer ' + token;
  return h;
}

async function apiCall(endpoint, options) {
  options = options || {};
  try {
    var incoming = options.headers || {};
    var merged = authHeaders(incoming);
    var r = await fetch(API_BASE + '/' + endpoint, Object.assign({ credentials: 'include' }, options, { headers: merged }));
    var data = await r.json();
    if (!r.ok || !data.success) throw new Error(data.error || 'API request failed');
    return data.data;
  } catch(e) {
    console.warn('apiCall failed:', endpoint, e);
    throw e;
  }
}

async function apiPost(endpoint, body) {
  return apiCall(endpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
}

async function apiPostForm(endpoint, formData) {
  return apiCall(endpoint, { method: 'POST', body: formData });
}

async function apiDelete(endpoint) {
  return apiCall(endpoint, { method: 'DELETE' });
}

async function apiPut(endpoint, body) {
  return apiCall(endpoint, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
}

/* Toast notification helper */
function showToast(msg, ok) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast';
    t.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 24px;border-radius:10px;font-family:Orbitron,sans-serif;font-size:0.68rem;font-weight:600;letter-spacing:0.1em;box-shadow:0 8px 30px rgba(0,0,0,0.5);transition:opacity 0.4s;pointer-events:none;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.background = ok ? 'rgba(16,185,129,0.92)' : 'rgba(239,68,68,0.92)';
  t.style.border = ok ? '1px solid #10b981' : '1px solid #ef4444';
  t.style.color = '#fff';
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 3500);
}
</script>

================================================================ */
async function getProjects() {
  try {
    return await apiCall('projects');
  } catch(e) { console.warn('getProjects:', e); return []; }
}

async function addProject(proj, bannerFile) {
  const fd = new FormData();
  fd.append('title',       proj.title || '');
  fd.append('description', proj.description || '');
  fd.append('tech_stack',  (proj.techStack || []).join(', '));
  fd.append('category',    proj.category || 'others');
  fd.append('github_link', proj.githubLink || '');

/* ---- Utility ---- */
function tryJSON(str, fallback) {
  try { return JSON.parse(str); } catch { return fallback; }
}

function hexToRgba(hex, alpha) {
  const clean = hex.replace('#','');
  const r = parseInt(clean.substring(0,2),16);
  const g = parseInt(clean.substring(2,4),16);
  const b = parseInt(clean.substring(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function fileToBase64(file) {
  return new Promise((res,rej) => {
    const reader = new FileReader();
    reader.onload = () => res(reader.result);
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
}


/* ================================================================
   4. ROUTER
================================================================ */
let currentPageCleanup = null;
let _isFirstLoad = true;

function navigate(path) {
  window.location.hash = path;
}

function getRoute() {
  return window.location.hash.slice(1) || '/';
}

function triggerWarpFlash(cb) {
  const flash = document.getElementById('warp-flash');
  if (!flash) { cb(); return; }
  flash.classList.add('flash');
  setTimeout(()=>{ flash.classList.remove('flash'); cb(); }, 160);
}

function route() {
  if (currentPageCleanup) { currentPageCleanup(); currentPageCleanup = null; }
  renderNavbar();
  const app = document.getElementById('app');
  const path = getRoute();

  function renderWithTransition(renderFn) {
    if (_isFirstLoad) {
      _isFirstLoad = false;
      app.classList.add('page-enter');
      renderFn(app);
      app.addEventListener('animationend', ()=>app.classList.remove('page-enter'), {once:true});
    } else {
      triggerWarpFlash(()=>{
        app.classList.add('page-enter');
        renderFn(app);
        app.addEventListener('animationend', ()=>app.classList.remove('page-enter'), {once:true});
      });
    }
  }

  if (path === '/') {
    renderWithTransition(renderHome);
  } else if (path === '/certificates') {
    renderWithTransition(renderCertificates);
  } else if (path.startsWith('/certificates/')) {
    const cat = path.split('/')[2];
    renderWithTransition(el => renderCertificateCategory(el, cat));
  } else if (path === '/projects') {
    renderWithTransition(renderProjects);
  } else if (path.startsWith('/projects/')) {
    const cat = path.split('/')[2];
    renderWithTransition(el => renderProjectCategory(el, cat));
  } else if (path === '/login') {
    renderWithTransition(renderLogin);
  } else if (path === '/admin') {
    if (!isAdmin) { navigate('/login'); return; }
    renderWithTransition(renderAdmin);
  } else {
    renderWithTransition(renderNotFound);
  }
}

window.addEventListener('hashchange', route);
window.addEventListener('load', async () => {
  await checkSession();          // Check PHP session login state
  await loadSettingsCache();     // Pre-fetch settings from DB
  route();
});

/* ================================================================
   6. SPACE BACKGROUND (Canvas – ported from SpaceBackground.tsx)
================================================================ */
(function initSpaceBackground() {
  const canvas = document.getElementById('space-bg');
  const ctx = canvas.getContext('2d');
  const STAR_COUNT    = 230;
  const ASTEROID_COUNT = 6;
  const BH_RADIUS     = 165;
  const CONSUME_RADIUS = 20;
  const RESPAWN_DELAY = 2200;
  const STAR_COLORS   = ['#ffffff','#dde8ff','#c8b8ff','#b8e4ff','#ffd0a0','#e0fff8'];

  const mouse = { x: -1000, y: -1000, active: false };
  let stars = [], asteroids = [], shooting = [];
  let bhSpin = 0, animId;

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  function createStar(w, h, randomY) {
    const baseVy = -(Math.random()*0.55+0.18);
    const baseSize = Math.random()*1.8+0.4;
    return {
      x: Math.random()*w, y: randomY ? Math.random()*h : h+Math.random()*50,
      vx:0, vy:baseVy, baseVy, size:baseSize, baseSize,
      opacity:Math.random()*0.5+0.5,
      color:STAR_COLORS[Math.floor(Math.random()*STAR_COLORS.length)],
      twinklePhase:Math.random()*Math.PI*2, consumed:false, consumedAt:0,
    };
  }

  function makeAsteroidPoints(radius) {
    return Array.from({length:8},(_,i)=>{
      const angle=(i/8)*Math.PI*2+(Math.random()-0.5)*0.4;
      const r=radius*(0.55+Math.random()*0.45);
      return {x:Math.cos(angle)*r, y:Math.sin(angle)*r};
    });
  }

  function createAsteroid(w, h) {
    const fromLeft = Math.random()>0.5, radius=Math.random()*22+12;
    return {
      x:fromLeft?-60:w+60, y:Math.random()*h,
      vx:fromLeft?Math.random()*0.7+0.25:-(Math.random()*0.7+0.25),
      vy:(Math.random()-0.5)*0.3,
      radius, rotation:Math.random()*Math.PI*2,
      rotSpeed:(Math.random()-0.5)*0.015,
      opacity:Math.random()*0.45+0.25,
      points:makeAsteroidPoints(radius),
      baseRadius:radius,
      // black hole state
      consumed:false, consumedAt:0,
      warpPhase:0,
    };
  }

  stars     = Array.from({length:STAR_COUNT},   ()=>createStar(canvas.width, canvas.height, true));
  asteroids = Array.from({length:ASTEROID_COUNT},()=>createAsteroid(canvas.width, canvas.height));

  const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

  if (!isTouchDevice) {
    window.addEventListener('mousemove', e=>{ mouse.x=e.clientX; mouse.y=e.clientY; mouse.active=true; });
    document.addEventListener('mouseleave', ()=>{ mouse.active=false; });
  }

  // Shooting stars
  function spawnShootingStar() {
    const angle = Math.PI/6+(Math.random()-0.5)*0.5;
    const speed = Math.random()*9+7;
    shooting.push({
      x:Math.random()*canvas.width, y:-10,
      vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed,
      length:Math.random()*110+60, opacity:1, active:true,
    });
    setTimeout(spawnShootingStar, Math.random()*4500+2000);
  }
  setTimeout(spawnShootingStar, 2500);

  function drawNebula(w, h) {
    [
      {x:w*0.15,y:h*0.25,r:180,c:'80,0,160'},
      {x:w*0.85,y:h*0.55,r:150,c:'0,60,130'},
      {x:w*0.5, y:h*0.85,r:130,c:'40,0,110'},
      {x:w*0.7, y:h*0.1, r:100,c:'0,100,100'},
    ].forEach(n=>{
      const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
      g.addColorStop(0,`rgba(${n.c},0.07)`); g.addColorStop(1,`rgba(${n.c},0)`);
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fill();
    });
  }

  function drawAsteroid(a) {
    ctx.save(); ctx.translate(a.x,a.y); ctx.rotate(a.rotation); ctx.globalAlpha=a.opacity;
    // warp distortion: scale shrinks and squishes toward black hole
    const scaleF = a.consumed ? Math.max(0.02, 1 - a.warpPhase) : 1;
    const squishX = a.consumed ? Math.max(0.05, 1 - a.warpPhase * 0.7) : 1;
    ctx.scale(squishX * scaleF, scaleF);
    ctx.beginPath();
    a.points.forEach((pt,i)=>{ if(i===0)ctx.moveTo(pt.x,pt.y); else ctx.lineTo(pt.x,pt.y); });
    ctx.closePath();
    const g=ctx.createRadialGradient(0,0,0,0,0,a.radius);
    if (a.consumed) {
      // glow purple/white as it warps in
      const gp = a.warpPhase;
      g.addColorStop(0,`rgba(${Math.floor(155+100*gp)},${Math.floor(136-136*gp)},${Math.floor(112+143*gp)},1)`);
      g.addColorStop(1,`rgba(${Math.floor(58+90*gp)},${Math.floor(48-48*gp)},${Math.floor(40+80*gp)},1)`);
    } else {
      g.addColorStop(0,'#9B8870'); g.addColorStop(1,'#3a3028');
    }
    ctx.fillStyle=g; ctx.fill();
    ctx.strokeStyle= a.consumed ? `rgba(180,80,255,${0.6*(1-a.warpPhase)})` : 'rgba(120,100,80,0.5)';
    ctx.lineWidth=a.consumed ? 1.5 : 1; ctx.stroke();
    if (!a.consumed) {
      ctx.fillStyle='rgba(0,0,0,0.3)';
      [{x:a.radius*0.2,y:-a.radius*0.2,r:a.radius*0.12},{x:-a.radius*0.3,y:a.radius*0.1,r:a.radius*0.08}].forEach(c=>{
        ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,Math.PI*2); ctx.fill();
      });
    }
    ctx.restore();
  }

  function drawBlackHole(x, y, spin) {
    const g1=ctx.createRadialGradient(x,y,8,x,y,BH_RADIUS);
    g1.addColorStop(0,'rgba(0,0,15,0.75)'); g1.addColorStop(0.35,'rgba(0,0,25,0.32)'); g1.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g1; ctx.beginPath(); ctx.arc(x,y,BH_RADIUS,0,Math.PI*2); ctx.fill();

    const diskColors=['rgba(148,30,255,','rgba(40,100,255,','rgba(0,210,255,'];
    for(let i=0;i<3;i++){
      const r=32+i*10, alpha=0.7-i*0.18;
      ctx.save(); ctx.translate(x,y); ctx.rotate(spin+(i*Math.PI)/2.5); ctx.scale(1,0.28);
      ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
      ctx.strokeStyle=`${diskColors[i]}${alpha})`; ctx.lineWidth=3-i*0.5;
      ctx.shadowBlur=15; ctx.shadowColor=diskColors[i]+'1)'; ctx.stroke(); ctx.restore();
    }

    const g2=ctx.createRadialGradient(x,y,0,x,y,24);
    g2.addColorStop(0,'rgba(0,0,0,1)'); g2.addColorStop(0.75,'rgba(8,0,28,0.97)'); g2.addColorStop(1,'rgba(80,0,160,0.55)');
    ctx.fillStyle=g2; ctx.beginPath(); ctx.arc(x,y,24,0,Math.PI*2); ctx.fill();

    ctx.beginPath(); ctx.arc(x,y,26,0,Math.PI*2);
    ctx.strokeStyle='rgba(148,30,255,0.95)'; ctx.lineWidth=2.5;
    ctx.shadowBlur=25; ctx.shadowColor='#9400ff'; ctx.stroke(); ctx.shadowBlur=0;
  }

  function animate() {
    const w=canvas.width, h=canvas.height;
    ctx.clearRect(0,0,w,h);
    bhSpin += 0.018;
    const now = Date.now();
    drawNebula(w,h);

    // Stars
    stars.forEach((star,i)=>{
      if(star.consumed){
        // spiral warp into black hole
        if(!star.warpPhase) star.warpPhase = 0;
        star.warpPhase += 0.06;
        const dx=mouse.x-star.x, dy=mouse.y-star.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>0.5){ star.x+=dx*0.18; star.y+=dy*0.18; }
        star.rotation = (star.rotation||0) + 0.25;
        const warpOpacity = Math.max(0, 1 - star.warpPhase);
        if(star.warpPhase>=1){
          if(now-star.consumedAt>RESPAWN_DELAY) stars[i]=createStar(w,h,false);
        } else {
          const warpSize = star.size * (1 + star.warpPhase * 1.5);
          ctx.save(); ctx.globalAlpha = warpOpacity * star.opacity;
          ctx.shadowBlur = 12 + star.warpPhase * 20; ctx.shadowColor = '#a855f7';
          ctx.fillStyle = star.warpPhase > 0.5 ? '#c084fc' : star.color;
          ctx.beginPath(); ctx.arc(star.x,star.y,warpSize,0,Math.PI*2); ctx.fill();
          ctx.restore();
        }
        return;
      }
      const dx=mouse.x-star.x, dy=mouse.y-star.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(mouse.active && dist<BH_RADIUS){
        const strength=Math.pow((BH_RADIUS-dist)/BH_RADIUS,2)*3.2;
        const nx=dx/dist, ny=dy/dist, px=-ny, py=nx;
        star.vx+=nx*strength*0.45+px*strength*0.18;
        star.vy+=ny*strength*0.45+py*strength*0.18;
        const spd=Math.sqrt(star.vx*star.vx+star.vy*star.vy);
        if(spd>9){star.vx=(star.vx/spd)*9; star.vy=(star.vy/spd)*9;}
        star.size=star.baseSize*Math.max(0.08,dist/BH_RADIUS);
        if(dist<CONSUME_RADIUS){star.consumed=true; star.consumedAt=now; star.warpPhase=0; return;}
      } else {
        star.vx*=0.93; star.vy=star.vy*0.93+star.baseVy*0.07;
        star.size=star.size*0.96+star.baseSize*0.04;
      }
      star.x+=star.vx; star.y+=star.vy;
      star.twinklePhase+=0.022;
      const twinkle=0.75+0.25*Math.sin(star.twinklePhase);
      if(star.y<-star.size*2){star.x=Math.random()*w; star.y=h+5; star.vx=0; star.vy=star.baseVy; star.size=star.baseSize;}
      if(star.x<0) star.x=w; if(star.x>w) star.x=0;
      ctx.save(); ctx.globalAlpha=star.opacity*twinkle; ctx.fillStyle=star.color;
      if(star.size>1.2){ctx.shadowBlur=7; ctx.shadowColor=star.color;}
      ctx.beginPath(); ctx.arc(star.x,star.y,star.size,0,Math.PI*2); ctx.fill(); ctx.restore();
    });

    // Asteroids
    asteroids.forEach((a,i)=>{
      if(a.consumed){
        a.warpPhase += 0.045;
        // spiral toward black hole center
        const dx=mouse.x-a.x, dy=mouse.y-a.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>1){ a.x+=dx*0.12; a.y+=dy*0.12; }
        a.rotation += 0.18;
        a.opacity = Math.max(0, 1 - a.warpPhase * 1.1);
        if(a.warpPhase>=1 || a.opacity<=0){
          asteroids[i]=createAsteroid(w,h);
        } else {
          drawAsteroid(a);
        }
        return;
      }
      a.x+=a.vx; a.y+=a.vy; a.rotation+=a.rotSpeed;
      // Black hole gravitational pull on asteroids
      if(mouse.active){
        const dx=mouse.x-a.x, dy=mouse.y-a.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        const ASTEROID_BH_RADIUS = BH_RADIUS * 1.4;
        if(dist<ASTEROID_BH_RADIUS && dist>1){
          const strength=Math.pow((ASTEROID_BH_RADIUS-dist)/ASTEROID_BH_RADIUS,2)*1.8;
          const nx=dx/dist, ny=dy/dist;
          // tangential component for spiral
          const px=-ny, py=nx;
          a.vx+=nx*strength*0.55+px*strength*0.22;
          a.vy+=ny*strength*0.55+py*strength*0.22;
          // cap asteroid speed
          const spd=Math.sqrt(a.vx*a.vx+a.vy*a.vy);
          if(spd>5){a.vx=(a.vx/spd)*5; a.vy=(a.vy/spd)*5;}
          if(dist<CONSUME_RADIUS*2.5){
            a.consumed=true; a.warpPhase=0;
          }
        }
      }
      if(a.x>w+100||a.x<-100||a.y>h+100||a.y<-100) asteroids[i]=createAsteroid(w,h);
      drawAsteroid(a);
    });

    // Shooting stars
    shooting = shooting.filter(ss=>{
      if(!ss.active) return false;
      ss.x+=ss.vx; ss.y+=ss.vy; ss.opacity-=0.013;
      if(ss.opacity<=0||ss.y>h+20) return false;
      ctx.save(); ctx.globalAlpha=ss.opacity;
      const hyp=Math.hypot(ss.vx,ss.vy);
      const sg=ctx.createLinearGradient(ss.x,ss.y,ss.x-ss.vx*(ss.length/hyp),ss.y-ss.vy*(ss.length/hyp));
      sg.addColorStop(0,'rgba(255,255,255,1)'); sg.addColorStop(0.5,'rgba(200,220,255,0.6)'); sg.addColorStop(1,'rgba(200,220,255,0)');
      ctx.strokeStyle=sg; ctx.lineWidth=2; ctx.shadowBlur=8; ctx.shadowColor='#ffffff';
      ctx.beginPath(); ctx.moveTo(ss.x,ss.y);
      const len=ss.length/hyp; ctx.lineTo(ss.x-ss.vx*len,ss.y-ss.vy*len); ctx.stroke(); ctx.restore();
      return true;
    });

    if(mouse.active) drawBlackHole(mouse.x, mouse.y, bhSpin);
    animId = requestAnimationFrame(animate);
  }
  animate();
})();

    const rect = sec.getBoundingClientRect();
    const sectionScrollH = sec.scrollHeight - window.innerHeight;
    const scrolled = -rect.top;
    const progress = Math.max(0, Math.min(1, scrolled/sectionScrollH));
    updateRocket(progress);
  }

  rocketScrollFn = handleScroll;
  window.addEventListener('scroll', handleScroll, {passive:true});

  /* Trail fading loop */
  function trailFade() {
    rocketTrailParticles = rocketTrailParticles.map(p=>({...p, opacity:p.opacity-0.025})).filter(p=>p.opacity>0);
    const container = document.getElementById('trail-container');
    if (!container) return;
    container.innerHTML = rocketTrailParticles.map(p=>
      `<div style="position:absolute;left:calc(50% + ${p.x}px);top:${p.y}px;width:${p.size}px;height:${p.size}px;border-radius:50%;background:${p.color};opacity:${p.opacity};transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 ${p.size*2}px ${p.color};"></div>`
    ).join('');
    rocketTrailRAF = requestAnimationFrame(trailFade);
  }
  rocketTrailRAF = requestAnimationFrame(trailFade);
}

function cleanupRocket() {
  if (rocketScrollFn) { window.removeEventListener('scroll', rocketScrollFn); rocketScrollFn = null; }
  if (rocketTrailRAF) { cancelAnimationFrame(rocketTrailRAF); rocketTrailRAF = null; }
  rocketTrailParticles = [];
}

let lastProgress = -1;
let currentRocketY = 90;
let targetRocketY = 90;
let rocketAnimating = false;

function smoothRocketLoop() {
  const diff = targetRocketY - currentRocketY;
  if (Math.abs(diff) > 0.5) {
    currentRocketY += diff * 0.12;
    const rocket = document.getElementById('rocket-el');
    if (rocket) {
      rocket.style.transform = `translate(-50%,-50%) translateY(${currentRocketY}px)`;
    }
    requestAnimationFrame(smoothRocketLoop);
  } else {
    currentRocketY = targetRocketY;
    const rocket = document.getElementById('rocket-el');
    if (rocket) {
      rocket.style.transform = `translate(-50%,-50%) translateY(${currentRocketY}px)`;
    }
    rocketAnimating = false;
  }
}

function startRocketSmooth() {
  if (!rocketAnimating) {
    rocketAnimating = true;
    requestAnimationFrame(smoothRocketLoop);
  }
}

function updateRocket(progress) {
  const rocket = document.getElementById('rocket-el');
  const intro  = document.getElementById('rocket-intro');
  const scrollInd = document.getElementById('scroll-indicator');
  if (!rocket) return;

  /* Cap rocket travel so it never overlaps the footer.
     The sticky viewport is 100vh; stop ~130px from the bottom edge. */
  const maxRocketY = window.innerHeight - 220;
  targetRocketY = Math.min(90 + progress * 560, maxRocketY);
  startRocketSmooth();

  if (intro) intro.style.opacity = Math.max(0, 1 - progress*15);
  if (scrollInd) scrollInd.style.opacity = Math.max(0, 1 - progress*8);

  /* Rocket glow intensifies with speed */
  const speed = Math.abs(targetRocketY - currentRocketY);
  const glowIntensity = Math.min(1, speed / 30);
  const baseGlow = 18 + glowIntensity * 25;
  const outerGlow = 35 + glowIntensity * 40;
  rocket.style.filter = `drop-shadow(0 0 ${baseGlow}px rgba(168,85,247,${0.7 + glowIntensity * 0.3})) drop-shadow(0 0 ${outerGlow}px rgba(6,182,212,${0.3 + glowIntensity * 0.5}))`;

  /* Add trail particle */
  if (progress > 0.02) {
    const particleCount = Math.max(1, Math.floor(speed / 5));
    for (let i = 0; i < particleCount && i < 3; i++) {
      rocketTrailParticles.push({
        id: rocketParticleId++,
        y: currentRocketY - 10 + (Math.random()-0.5)*8,
        x: (Math.random()-0.5)*22,
        size: Math.random()*5+2 + glowIntensity*3,
        opacity: 0.7 + Math.random()*0.3,
        color: TRAIL_COLORS[Math.floor(Math.random()*TRAIL_COLORS.length)],
      });
    }
    if (rocketTrailParticles.length > 120) rocketTrailParticles = rocketTrailParticles.slice(-120);
  }

  /* Update achievement cards */
  if (Math.abs(progress - lastProgress) > 0.003) {
    lastProgress = progress;
    renderAchCards(progress);
  }
}

function renderAchCards(progress) {
  const container = document.getElementById('ach-cards-container');
  if (!container) return;

  container.innerHTML = ACHIEVEMENTS.map(ach => {
    const visible = progress >= ach.threshold;

      ? `<button onclick="${ach.link.external ? `window.open('${ach.link.href}','_blank')` : `navigate('${ach.link.href}')`}" style="background:linear-gradient(135deg,rgba(124,58,237,0.3),rgba(6,182,212,0.2));border:1px solid rgba(124,58,237,0.4);color:#a855f7;padding:8px 14px;border-radius:7px;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:0.65rem;font-weight:600;letter-spacing:0.08em;width:100%;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:14px;">

        <div style="font-family:'Orbitron',sans-serif;font-size:0.75rem;font-weight:700;color:#06b6d4;letter-spacing:0.1em;margin-bottom:12px;">${ach.icon} ${ach.title.toUpperCase()}</div>
        <ul style="list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px;">
          ${ach.details.map(d=>`<li style="display:flex;align-items:flex-start;gap:8px;color:#94a3b8;font-family:'Rajdhani',sans-serif;font-size:0.82rem;line-height:1.5;"><span style="color:#a855f7;margin-top:2px;flex-shrink:0;font-size:0.6rem;">▶</span>${d}</li>`).join('')}
        </ul>

      </div>`;

    const cardHtml = `
      <div class="ach-summary">
        <span style="font-size:1.4rem;">${ach.icon}</span>
        <div>
          <div style="font-family:'Orbitron',sans-serif;font-size:0.72rem;font-weight:700;color:#a855f7;letter-spacing:0.05em;">${ach.title}</div>

        </div>
      </div>
      ${popupHtml}`;

    const xOffset = visible ? 0 : (side==='left' ? -40 : 40);
    const cardMargin = side==='right' ? 'margin-left:12px;' : 'margin-right:12px;';

    return `
      <div class="ach-card" style="position:absolute;top:${nodeY}px;${side==='left'?'right':'left'}:calc(50% + 30px);transform:translateY(-50%) translateX(${xOffset}px);display:flex;flex-direction:${side==='left'?'row-reverse':'row'};align-items:center;gap:0;opacity:${visible?1:0};transition:opacity 0.6s ease,transform 0.6s ease;z-index:20;pointer-events:${visible?'auto':'none'};">

        <div class="node-dot"></div>
        <div style="${cardMargin}position:relative;max-width:min(320px,38vw);">
          ${cardHtml}

      </div>`;
  }).join('');
}

async function loadCertPreview(file) {
  const b64 = await fileToBase64(file);
  const pw = document.getElementById('ci-preview-wrapper');
  const pi = document.getElementById('ci-preview');
  const fn = document.getElementById('ci-filename');
  const fileInp = document.getElementById('ci-file');
  if (pw) pw.style.display = 'block';
  if (pi) pi.src = b64;
  if (fn) fn.textContent = file.name + ' (' + (file.size/1024).toFixed(1) + ' KB)';
  if (fileInp) fileInp._base64 = b64;
  // Update dropzone
  const dz = document.getElementById('ci-dropzone');
  if (dz) { dz.style.borderStyle = 'solid'; dz.querySelector('div').textContent = '✅'; }
}

async function handleCertDrop(event, color, border) {
  event.preventDefault();
  const dz = document.getElementById('ci-dropzone');
  if (dz) { dz.style.borderColor = border; dz.style.background = 'rgba(8,6,30,0.5)'; }
  const file = event.dataTransfer.files[0];
  if (!file || !file.type.startsWith('image/')) { alert('Please drop an image file.'); return; }
  // Sync the hidden file input (best effort)
  const fileInp = document.getElementById('ci-file');
  if (fileInp) {
    const dt = new DataTransfer();
    dt.items.add(file);
    fileInp.files = dt.files;
  }
  loadCertPreview(file);
}

        { title, category:cat, bannerUrl: bannerInp._base64 || '', projectImageUrl: (imgInp && imgInp._base64) || bannerInp._base64 || '', description:desc, bullets, techStack:tech.split(',').map(s=>s.trim()).filter(Boolean), liveUrl:live, codeSnippet:code },
        bannerFile || null,
        imgFile || null
      );
      if (result && !result.success) {
        showToast('✕ Publish failed: ' + result.error, false);
        btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> PUBLISH PROJECT`;
        btn.disabled = false;
        return;
      }
      showToast('✓ Project published successfully!', true);
      navigate(`/projects/${cat}`);
    });
  }
}

async function handleProjDrop(event, inputId, previewId, dzId) {
  event.preventDefault();
  const file = event.dataTransfer.files[0];
  if (!file || !file.type.startsWith('image/')) { alert('Please drop an image file.'); return; }
  const dz = document.getElementById(dzId);
  if (dz) { dz.style.borderStyle='solid'; dz.querySelector('div').textContent='✅'; }
  const b64 = await fileToBase64(file);
  const inp = document.getElementById(inputId);
  if (inp) {
    inp._base64 = b64;
    try { const dt=new DataTransfer(); dt.items.add(file); inp.files=dt.files; } catch(e){}
  }
  const prev = document.getElementById(previewId);
  if (prev) { prev.src = b64; prev.style.display = 'block'; }
}

    content.innerHTML = renderAdminTabContent(tab, stats, projects, certificates);
  } else if (tab === 'skills') {
    const data = await getSkills();
    content.innerHTML = renderSkillsTab(data.skills || []);
  } else if (tab === 'experience') {
    const data = await getExperience();
    content.innerHTML = renderExperienceTab(data);
  } else if (tab === 'social') {
    const data = await getSocialLinks(true);
    content.innerHTML = renderSocialTab(data);
  } else if (tab === 'messages') {
    const data = await getContacts();
    content.innerHTML = renderMessagesTab(data);
  } else {
    content.innerHTML = renderAdminTabContent(tab, [], [], []);
  }
}

/* ---- Hero Photo Admin Actions ---- */
let _pendingPhotoData = null; // holds base64 or url before save
let _pendingFile = null;      // holds the raw File before save

function handlePhotoFileChange(event) {
  const file = event.target.files[0];
  if (!file) return;
  _pendingFile = file;
  fileToBase64(file).then(b64 => {
    _pendingPhotoData = b64;
    updatePhotoPreviewEl(b64);
  });
}

function handlePhotoDrop(event) {
  const file = event.dataTransfer.files[0];
  if (!file || !file.type.startsWith('image/')) return;
  _pendingFile = file;
  fileToBase64(file).then(b64 => {
    _pendingPhotoData = b64;
    updatePhotoPreviewEl(b64);
  });
}

function applyPhotoUrl() {
  const url = (document.getElementById('photo-url-input')||{}).value || '';
  if (!url) return;
  _pendingPhotoData = url;
  updatePhotoPreviewEl(url);
}

function updatePhotoPreviewEl(src) {
  const el = document.getElementById('photo-preview-img');
  if (!el) return;
  el.outerHTML = `<img id="photo-preview-img" src="${src}" style="width:100%;height:100%;object-fit:cover;" />`;
}

function showPhotoMsg(text, ok) {
  const el = document.getElementById('photo-save-msg');
  if (!el) return;
  el.textContent = text;
  el.style.background = ok ? 'rgba(16,185,129,0.15)' : 'rgba(239,68,68,0.15)';
  el.style.border = ok ? '1px solid rgba(16,185,129,0.4)' : '1px solid rgba(239,68,68,0.4)';
  el.style.color = ok ? '#34d399' : '#f87171';
  el.style.display = 'block';
  setTimeout(() => { if (el) el.style.display = 'none'; }, 3000);
}

async function saveAdminHeroPhoto() {
  const urlInput = (document.getElementById('photo-url-input')||{}).value || '';
  const file = _pendingFile;
  if (!file && !urlInput) { showPhotoMsg('⚠ No photo selected or URL entered.', false); return; }
  const fd = new FormData();
  if (file) fd.append('profile_image', file);
  else fd.append('profile_image', urlInput);
  try {
    const result = await apiPostForm('settings', fd);
    if (result) { _settingsCache = result; _heroPhotoCache = result.profile_image || null; }

/* ---- Security Admin Actions ---- */
function toggleSecPw() {
  const inp = document.getElementById('sec-pw');
  const btn = inp && inp.nextElementSibling;
  if (!inp) return;
  const isPw = inp.type === 'password';
  inp.type = isPw ? 'text' : 'password';
  if (btn) btn.innerHTML = isPw ? ICONS.eyeOff : ICONS.eye;
}

async function saveAdminCredentialsUI() {
  const email = (document.getElementById('sec-email')||{}).value || '';
  const pw    = (document.getElementById('sec-pw')||{}).value    || '';
  const pw2   = (document.getElementById('sec-pw2')||{}).value   || '';
  const err   = document.getElementById('sec-error');
  const hide  = ()=>{ if(err) err.style.display='none'; };
  if (!email) { if(err){err.textContent='Email cannot be empty.';err.style.display='block';} return; }
  if (!pw)    { if(err){err.textContent='Password cannot be empty.';err.style.display='block';} return; }
  if (pw!==pw2){ if(err){err.textContent='Passwords do not match.';err.style.display='block';} return; }
  hide();
  try {
    await apiPost('auth/change-credentials', { email, password: pw });
    showToast('✓ Credentials updated!', true);
    setTimeout(()=>doLogout(), 1500);
  } catch(e) { if(err){err.textContent='Error: '+e.message;err.style.display='block';} }
}
