[build]
  publish = "."
  command = "node generate-manifests.js"

# Serve the right files
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets aggressively
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Cache JSON content files briefly (so CMS updates show fast)
[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "public, max-age=30"

[[headers]]
  for = "/_data/*"
  [headers.values]
    Cache-Control = "public, max-age=30"

# SPA-style routing: everything falls back to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Role = ["admin"]}

# Identity / OAuth for Decap CMS
[template.environment]
  NETLIFY_CMS_BACKEND_NAME = "github"
